name: Build Android App Bundle (AAB)

on:
  workflow_dispatch:   # déclenchement manuel depuis l'onglet "Actions" de GitHub
  push:
    tags:
      - 'v*'           # ou automatiquement à chaque tag de version (ex. v1.0.1)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        run: npm ci

      - name: Build de l'application web
        run: npm run build
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_PLANT_VISION_ENDPOINT: ${{ secrets.VITE_PLANT_VISION_ENDPOINT }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Synchroniser le projet Android (Capacitor)
        run: npx cap sync android

      - name: Installer le JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Restaurer la clé de signature (keystore) depuis le secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/pilot-potager-release.keystore

      - name: Générer le fichier keystore.properties depuis les secrets
        run: |
          cat > android/keystore.properties << PROPS
          storeFile=app/pilot-potager-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      - name: Construire le bundle signé (.aab)
        working-directory: android
        run: chmod +x gradlew && ./gradlew bundleRelease --no-daemon

      - name: Publier le fichier .aab en tant qu'artefact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: pilot-potager-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
