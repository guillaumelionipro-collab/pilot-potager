<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
  .banner{
    width:1024px;height:500px;
    background:linear-gradient(120deg,#0f3324 0%,#1f7a4d 55%,#2fae6e 100%);
    display:flex;align-items:center;justify-content:space-between;
    position:relative;overflow:hidden;
    padding:0 70px;
    box-sizing:border-box;
  }
  .glow1{position:absolute;width:500px;height:500px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
    top:-200px; right:-100px;}
  .glow2{position:absolute;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    bottom:-180px; left:-100px;}
  .left{position:relative; z-index:2; max-width:560px;}
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.15); color:#fff;
    font-size:18px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
    padding:8px 18px; border-radius:999px; margin-bottom:18px;
  }
  h1{
    color:#fff; font-size:56px; font-weight:900; margin:0 0 14px 0; line-height:1.1;
    text-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  p{
    color:rgba(255,255,255,0.88); font-size:24px; font-weight:600; margin:0; line-height:1.4;
  }
  .right{
    position:relative; z-index:2; font-size:220px;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.35));
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="left">
      <div class="badge">🌱 Pilot Potager</div>
      <h1>Votre potager, boosté par l'IA</h1>
      <p>Identifiez vos plantes, suivez vos cultures et récoltez plus, jour après jour.</p>
    </div>
    <div class="right">🌿</div>
  </div>
</body>
</html>
