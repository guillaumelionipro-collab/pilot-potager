<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
  .frame{
    width:1080px;height:1920px;
    background:linear-gradient(160deg,#0f3324 0%,#1f7a4d 60%,#2fae6e 100%);
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center;
    box-sizing:border-box; padding:90px 60px 0 60px;
  }
  .glow{position:absolute;width:700px;height:700px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
    top:-260px; right:-220px;}
  .badge{
    display:inline-flex;align-items:center;gap:10px;
    background:rgba(255,255,255,0.15); color:#fff;
    font-size:26px; font-weight:800; letter-spacing:3px; text-transform:uppercase;
    padding:10px 24px; border-radius:999px; margin-bottom:30px; z-index:2;
  }
  h1{
    color:#fff; font-size:64px; font-weight:900; text-align:center; margin:0 0 60px 0;
    line-height:1.15; z-index:2; max-width:880px;
    text-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .phone{
    width:760px; height:1180px; background:#fff; border-radius:60px;
    box-shadow:0 40px 80px rgba(0,0,0,0.4);
    position:relative; z-index:2; border:14px solid #16432f;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  /* Replace this img src with your actual app screenshot */
  .phone img{ width:100%; height:100%; object-fit:cover; }
  .placeholder{ color:#9bb3a8; font-size:32px; font-weight:700; text-align:center; padding:40px; }
</style>
</head>
<body>
  <div class="frame">
    <div class="glow"></div>
    <div class="badge">🌱 Pilot Potager</div>
    <h1>Identifiez vos plantes en un instant grâce à l'IA</h1>
    <div class="phone">
      <!-- <img src="screenshot-analyse-ia.png" /> -->
      <div class="placeholder">Remplacez par une vraie<br/>capture d'écran de l'app<br/>(&lt;img src="..."&gt;)</div>
    </div>
  </div>
</body>
</html>
